name: Build macOS App

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-mac.yml'
      - 'memo-app/**'
      - 'Mac/**'

jobs:
  build-macos:
    runs-on: macos-14
    defaults:
      run:
        working-directory: memo-app

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: memo-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Generate macOS icon
        run: npm run gen:icon:mac

      - name: Build macOS installer
        run: npm run gen:icon:mac && npm run build && npx electron-builder --mac dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: memo-app-macos-installer
          path: memo-app/release/*.dmg
          if-no-files-found: error
